spring:

  datasource:
    # Full JDBC URL — must include sslmode=require for Neon.
    # Example: jdbc:postgresql://ep-xxx.us-east-2.aws.neon.tech/neondb?sslmode=require
    url:      ${NEON_DB_URL}
    username: ${NEON_DB_USERNAME}
    password: ${NEON_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Conservative pool for Neon serverless: too many idle connections
      # keep the serverless proxy warm and count against your quota.
      maximum-pool-size:   5
      minimum-idle:        1
      connection-timeout:  20000   # ms — fail fast rather than queue indefinitely
      idle-timeout:        600000  # 10 min — release idle connections before Neon times them out

  jpa:
    hibernate:
      # Sprint 2 dev mode only.
      # Switch to 'validate' + enable Flyway (below) before any production deploy.
      # WARNING: 'update' adds columns but never drops them — renames create orphan columns.
      ddl-auto: update
    show-sql: true
    open-in-view: false   # prevent lazy-load anti-pattern leaking through REST layer
    properties:
      hibernate:
        dialect:    org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    # Disabled while schema is still evolving under ddl-auto: update.
    # To activate: set enabled=true, set ddl-auto=validate, add
    # src/main/resources/db/migration/V1__create_schema.sql
    enabled: false

geocoding:
  google-maps:
    api-key: ${GOOGLE_MAPS_API_KEY}

server:
  port: 8080

logging:
  level:
    com.vergaraverse: DEBUG
    org.hibernate.SQL: DEBUG
